name: Breach Monitor

on:
  schedule:
    # Twice a day: 07:00 and 19:00 UTC. Adjust to your timezone as needed.
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit state.json back

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run breach monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "botbot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: update breach state [skip ci]"
          git push
